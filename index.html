<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>스무 살 고민 월드컵</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:#0e0e12;color:#fff;font-family:"Pretendard","Apple SD Gothic Neo","Malgun Gothic",system-ui,sans-serif;
    display:flex;flex-direction:column;height:100dvh;overflow:hidden;-webkit-font-smoothing:antialiased}
  header{display:flex;justify-content:space-between;align-items:center;padding:16px 22px;flex:none}
  header .nm{font-size:clamp(16px,2.4vw,22px);font-weight:800;letter-spacing:-.02em}
  header .nm small{display:block;font-size:11px;font-weight:600;letter-spacing:.22em;color:#8a8a96;margin-bottom:3px}
  header .bd{font-size:clamp(13px,1.8vw,16px);font-weight:700;background:rgba(255,255,255,.12);
    padding:7px 15px;border-radius:999px;white-space:nowrap}
  main{flex:1;min-height:0;position:relative;padding:0 16px}
  .stage{position:relative;height:100%;display:flex;gap:14px}
  .panel{position:relative;flex:1;min-width:0;border-radius:16px;overflow:hidden;cursor:pointer;
    background:#1b1b22;transition:transform .18s ease, filter .3s ease;isolation:isolate}
  .panel img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
  .panel .shade{position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.18) 0%,rgba(0,0,0,0) 32%,rgba(0,0,0,.18) 58%,rgba(0,0,0,.82) 100%)}
  .panel .tag{position:absolute;top:14px;left:14px;font-size:clamp(11px,1.4vw,13px);font-weight:700;
    background:rgba(0,0,0,.42);backdrop-filter:blur(3px);padding:5px 12px;border-radius:999px;letter-spacing:.02em}
  .panel .qt{position:absolute;left:0;right:0;bottom:0;padding:0 20px 26px;text-align:center;
    font-size:clamp(26px,4.4vw,46px);font-weight:800;line-height:1.2;
    text-shadow:0 2px 18px rgba(0,0,0,.7)}
  .panel .qt .sub{display:block;font-size:clamp(12px,1.7vw,16px);font-weight:600;color:rgba(255,255,255,.82);margin-top:7px;text-shadow:0 1px 8px rgba(0,0,0,.6)}
  .panel:hover{filter:brightness(1.08)}
  .panel:active{transform:scale(.992)}
  .panel.win{outline:4px solid #fff;outline-offset:-4px;filter:brightness(1.12)}
  .panel.lose{filter:grayscale(.85) brightness(.4)}
  .vs{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:5;
    width:clamp(58px,7vw,86px);height:clamp(58px,7vw,86px);border-radius:50%;
    display:flex;align-items:center;justify-content:center;font-weight:900;font-size:clamp(20px,2.8vw,30px);color:#fff;
    background:conic-gradient(from 0deg,#ff8a8a,#ffd36e,#a0e7a0,#8ad7ff,#c8a0ff,#ff8a8a);
    box-shadow:0 4px 22px rgba(0,0,0,.5);border:4px solid #0e0e12;pointer-events:none;font-style:italic}
  footer{flex:none;display:flex;justify-content:center;align-items:center;gap:18px;padding:14px;color:#8a8a96;font-size:13px}
  footer button{background:rgba(255,255,255,.1);color:#fff;border:none;border-radius:9px;
    padding:9px 16px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
  footer button:active{transform:scale(.97)}
  /* 우승 */
  .champ{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:14px;text-align:center;border-radius:16px;overflow:hidden}
  .champ img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;filter:brightness(.55)}
  .champ .inner{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;gap:12px;padding:24px}
  .champ .crown{font-size:clamp(40px,6vw,64px)}
  .champ .lab{font-size:13px;letter-spacing:.3em;color:rgba(255,255,255,.85)}
  .champ .qt{font-size:clamp(28px,5vw,52px);font-weight:800;white-space:pre-line;line-height:1.25;text-shadow:0 2px 18px rgba(0,0,0,.7)}
  .champ .cat{font-size:14px;background:rgba(0,0,0,.4);padding:6px 16px;border-radius:999px}
  @media (max-width:760px){
    .stage{flex-direction:column}
  }
</style>
</head>

  seeds.forEach(function(s){ var i=new Image(); i.src=BASE+s.f; });
  var st, stage=document.getElementById("stage"), bd=document.getElementById("bd"), hint=document.getElementById("hint");
  function roundLabel(n){return n===8?"8강":n===4?"4강":n===2?"결승":n+"강";}
  function panelHTML(side,s){
    return '<div class="panel" id="p'+side+'" style="background:'+s.c+'">'
      +'<img src="'+BASE+s.f+'" alt="" onerror="this.style.display=\'none\'">'
      +'<div class="shade"></div>'
      +'<div class="qt">'+s.title+'<span class="sub">'+s.sub+'</span></div></div>';
  }
  function render(){
    if(st.champ!=null){ renderChamp(); return; }
    var a=seeds[st.pool[st.i]], b=seeds[st.pool[st.i+1]];
    bd.textContent=roundLabel(st.pool.length)+" "+(st.i/2+1)+"/"+(st.pool.length/2);
    stage.innerHTML=panelHTML("A",a)+'<div class="vs">VS</div>'+panelHTML("B",b);
    document.getElementById("pA").onclick=function(){pick("A");};
    document.getElementById("pB").onclick=function(){pick("B");};
  }
  function pick(side){
    if(st.locked)return; st.locked=true;
    var win=side==="A"?st.pool[st.i]:st.pool[st.i+1];
    document.getElementById("p"+side).classList.add("win");
    document.getElementById("p"+(side==="A"?"B":"A")).classList.add("lose");
    setTimeout(function(){
      st.next.push(win); st.i+=2;
      if(st.i>=st.pool.length){
        if(st.next.length===1){ st.champ=st.next[0]; }
        else { st.pool=st.next; st.next=[]; st.i=0; }
      }
      st.locked=false; render();
    },680);
  }
  function renderChamp(){
    var s=seeds[st.champ];
    bd.textContent="🏆 우승";
    hint.textContent="8개 주제 중 1위가 가려졌어요 — 이 주제로 본론 토크";
    stage.innerHTML='<div class="champ" style="background:'+s.c+'">'
      +'<img src="'+BASE+s.f+'" alt="" onerror="this.style.display=\'none\'">'
      +'<div class="inner"><div class="crown">👑</div>'
      +'<div class="lab">오늘의 우승 주제</div>'
      +'<div class="qt">'+s.title+'</div>'
      +'<div class="cat">'+s.sub+'</div></div></div>';
  }
  function reset(){ st={pool:[0,1,2,3,4,5,6,7],next:[],i:0,champ:null,locked:false};
    hint.textContent="둘 중 더 와닿는 주제를 선택 (← / →, 또는 클릭)"; render(); }
  document.getElementById("reset").onclick=reset;
  var fsBtn=document.getElementById("fs");
  function isFs(){return document.fullscreenElement||document.webkitFullscreenElement;}
  function toggleFs(){
    try{
      if(!isFs()){ var el=document.documentElement; (el.requestFullscreen||el.webkitRequestFullscreen||el.msRequestFullscreen).call(el); }
      else { (document.exitFullscreen||document.webkitExitFullscreen||document.msExitFullscreen).call(document); }
    }catch(e){}
  }
  fsBtn.onclick=toggleFs;
  function syncFsLabel(){ fsBtn.textContent=isFs()?"전체화면 끄기":"전체화면"; }
  document.addEventListener("fullscreenchange",syncFsLabel);
  document.addEventListener("webkitfullscreenchange",syncFsLabel);
  document.addEventListener("keydown",function(e){
    if(e.key==="f"||e.key==="F"){ toggleFs(); return; }
    if(st.champ!=null){ if(e.key==="Enter"||e.key===" ")reset(); return; }
    if(e.key==="ArrowLeft"||e.key==="1")pick("A");
    else if(e.key==="ArrowRight"||e.key==="2")pick("B");
  });
  reset();
})();
